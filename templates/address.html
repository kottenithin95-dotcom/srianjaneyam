<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Address</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/address.css' %}">
</head>
<body>

    <div class="address-container">

        <h1>📍 Shipping Address</h1>

        <p class="subtitle">
            Enter your delivery details
        </p>

        <form method="POST" class="address-form">

            {% csrf_token %}

            <div class="input-group">
                <label>Full Name</label>
                <input
                    type="text"
                    name="full_name"
                    placeholder="Enter Full Name"
                    required
                >
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter Email"
                    required
                >
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input
                    type="text"
                    name="mobile"
                    placeholder="Enter Mobile Number"
                    required
                >
            </div>

            <div class="input-group">
                <label>House No / Building</label>
                <input
                    type="text"
                    name="house"
                    placeholder="Flat / House Number"
                    required
                >
            </div>

            <div class="input-group full-width">
                <label>Street / Area</label>
                <input
                    type="text"
                    name="area"
                    placeholder="Area / Street"
                    required
                >
            </div>

            <div class="input-group">
                <label>City</label>
                <input
                    type="text"
                    name="city"
                    placeholder="City"
                    required
                >
            </div>

            <div class="input-group">
                <label>State</label>
                <input
                    type="text"
                    name="state"
                    placeholder="State"
                    required
                >
            </div>

            <div class="input-group full-width">
                <label>Pincode</label>
                <input
                    type="text"
                    name="pincode"
                    placeholder="Pincode"
                    required
                >
            </div>

            <button type="submit">
                Continue To Checkout →
            </button>

        </form>

    </div>

</body>
</html>
